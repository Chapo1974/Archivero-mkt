<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Listado</title><link rel="stylesheet" href="style.css"></head><body><header class="header-uai"><svg width="40" height="46" viewBox="0 0 40 46"><path d="M20 0 L40 8 V22 C40 34 32 42 20 46 C8 42 0 34 0 22 V8 Z" fill="#e6007e"></path><text x="20" y="28" font-size="14" fill="#fff" text-anchor="middle" font-family="Arial" font-weight="bold">AF</text></svg><div><h1 id="materiaTitulo">Materia</h1><p id="categoriaTitulo">Categoria</p></div></header><div class="contenido"><p><a id="subir" class="boton" href="#" target="_blank">Subir archivo</a></p><ul id="lista"></ul><p><a class="volver" id="volver" href="#">Volver a la materia</a></p></div><footer>Archivero de la Facultad</footer><script>const params = new URLSearchParams(window.location.search);const materia = params.get("materia");const categoria = params.get("categoria");const titulo = params.get("titulo") || materia;document.getElementById("materiaTitulo").textContent = titulo;document.getElementById("categoriaTitulo").textContent = categoria.charAt(0).toUpperCase() + categoria.slice(1);document.getElementById("subir").href = "https://github.com/Chapo1974/Archivero-mkt/upload/main/" + materia + "/" + categoria;document.getElementById("volver").href = materia + "/";fetch("https://api.github.com/repos/Chapo1974/Archivero-mkt/contents/" + materia + "/" + categoria).then(function(r){ return r.json(); }).then(function(files){ const lista = document.getElementById("lista"); const archivos = files.filter(function(f){ return f.name !== ".gitkeep"; }); if (archivos.length === 0) { lista.innerHTML = "<li>Todavia no hay archivos subidos en esta categoria.</li>"; } else { archivos.forEach(function(f){ const li = document.createElement("li"); const a = document.createElement("a"); a.href = f.download_url; a.textContent = f.name; a.target = "_blank"; li.appendChild(a); lista.appendChild(li); }); } }).catch(function(){ document.getElementById("lista").innerHTML = "<li>No se pudo cargar el listado.</li>"; });</script></body></html>
